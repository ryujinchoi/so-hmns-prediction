<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-HMNS v63.3 Global Prediction Core</title>
    
    <!-- 1. Leaflet 오픈소스 지도 CDN 링크 연동 (보안 HTTPS 명시) -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    <script src="https://cloudflare.com"></script>

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #050b14;
            font-family: monospace;
            color: #70a0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .monitor-box {
            background: rgba(10, 25, 47, 0.85);
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 20px rgba(30, 58, 138, 0.5);
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .title { color: #f43f5e; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 15px; }
        .status-line { margin: 8px 0; font-size: 0.95rem; }
        .success { color: #10b981; font-weight: bold; }
        
        /* 지도 컨테이너 스타일 */
        #map { 
            width: 90%; 
            max-width: 450px; 
            height: 320px; 
            border-radius: 8px; 
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            background: #091322; /* 로딩 전 배경색 */
        }
    </style>
</head>
<body>

    <div class="monitor-box">
        <div class="title">SO-HMNS V63.3 MONITOR</div>
        <div class="sub">MAGNITUDE COEFFICIENT 6.5</div>
        <hr style="border: 0; border-top: 1px solid #1e3a8a; margin: 15px 0;">
        <div class="status-line">[SYS] Auto-Computing...</div>
        <div class="status-line">[MATRIX] Active Factoring: M 4.9</div>
        <div class="status-line">[STATUS] <span class="success">100% SUCCESS</span></div>
    </div>

    <!-- 실제 지도가 매핑될 컨테이너 -->
    <div id="map"></div>

    <script>
        // DOM 요소와 외부 스크립트 로드가 완벽히 끝난 후 안전하게 실행
        window.addEventListener('DOMContentLoaded', function() {
            try {
                // Leaflet 라이브러리가 로드되었는지 최종 확인
                if (typeof L !== 'undefined') {
                    // 지도 객체 초기화 (서울 중심점 설정)
                    var map = L.map('map').setView([37.5665, 126.9780], 11);

                    // 표준 오픈스트리트맵 레이어 연결
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '© OSM'
                    }).addTo(map);

                    // 중심점 마커 바인딩
                    L.marker([37.5665, 126.9780]).addTo(map)
                        .bindPopup('<b>[SYS] SO-HMNS Core Active</b>')
                        .openPopup();
                        
                    // 모바일 브라우저 렌더링 밀림 현상 강제 방지 고정 명령어
                    setTimeout(function() {
                        map.invalidateSize();
                    }, 400);
                } else {
                    document.getElementById('map').innerHTML = "<p style='color:#f43f5e; padding:20px;'>[ERR] Map Library CDN Blocked.</p>";
                }
            } catch (e) {
                console.error(e);
            }
        });
    </script>
</body>
</html>
