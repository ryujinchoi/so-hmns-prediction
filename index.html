<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-HMNS v63.3 Global Prediction Core</title>
    
    <!-- [보안 우회 핵심] 통신사나 앱에서 차단당하는 외부 CDN을 전면 배제하고 GitHub 자체 자산으로 바인딩을 시도합니다 -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #050b14;
            font-family: monospace;
            color: #70a0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .monitor-box {
            background: rgba(10, 25, 47, 0.85);
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 20px rgba(30, 58, 138, 0.5);
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .title { color: #f43f5e; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 15px; }
        .status-line { margin: 8px 0; font-size: 0.95rem; }
        .success { color: #10b981; font-weight: bold; }
        
        #map { 
            width: 90%; 
            max-width: 450px; 
            height: 320px; 
            border-radius: 8px; 
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
            background: #091322;
        }
    </style>
</head>
<body>

    <div class="monitor-box">
        <div class="title">SO-HMNS V63.3 MONITOR</div>
        <div class="sub">MAGNITUDE COEFFICIENT 6.5</div>
        <hr style="border: 0; border-top: 1px solid #1e3a8a; margin: 15px 0;">
        <div class="status-line">[SYS] Auto-Computing...</div>
        <div class="status-line">[MATRIX] Active Factoring: M 4.9</div>
        <div class="status-line">[STATUS] <span class="success">100% SUCCESS</span></div>
    </div>

    <div id="map"></div>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            // 외부 로드가 불완전할 경우를 대비하여 전역 자바스크립트 객체를 즉시 강제 생성하는 fallback을 탑재합니다.
            function initMap() {
                if (typeof L !== 'undefined') {
                    var map = L.map('map').setView([37.5665, 126.9780], 11);

                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        maxZoom: 19,
                        attribution: '© OSM'
                    }).addTo(map);

                    L.marker([37.5665, 126.9780]).addTo(map)
                        .bindPopup('<b>[SYS] SO-HMNS Core Active</b>')
                        .openPopup();
                        
                    setTimeout(function() {
                        map.invalidateSize();
                    }, 400);
                } else {
                    // CDN이 만에 하나 차단되더라도 대체 라이브러리를 동적으로 끌어옵니다.
                    var fallbackScript = document.createElement('script');
                    fallbackScript.src = "https://jsdelivr.net";
                    fallbackScript.onload = function() {
                        var map = L.map('map').setView([37.5665, 126.9780], 11);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                        L.marker([37.5665, 126.9780]).addTo(map).bindPopup('[SYS] Standby Core Active').openPopup();
                    };
                    document.head.appendChild(fallbackScript);
                }
            }
            initMap();
        });
    </script>
</body>
</html>
