<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-HMNS v63.3 Global Prediction Core</title>
    <!-- Leaflet 지도 라이브러리 정상 바인딩 (보안 프로토콜 https 적용) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #050b14;
            font-family: monospace;
            color: #70a0ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* 대시보드 모니터 스타일 */
        .monitor-box {
            background: rgba(10, 25, 47, 0.85);
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 20px rgba(30, 58, 138, 0.5);
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .title { color: #f43f5e; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px; }
        .sub { color: #64748b; font-size: 0.85rem; margin-bottom: 15px; }
        .status-line { margin: 8px 0; font-size: 0.95rem; }
        .success { color: #10b981; font-weight: bold; }
        
        /* [핵심 교정] 지도가 절대 찌그러지거나 숨겨지지 않도록 크기 고정 */
        #map { 
            width: 90%; 
            max-width: 450px; 
            height: 300px; 
            border-radius: 8px; 
            border: 1px solid #1e3a8a;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- SO-HMNS 대시보드 모니터 구조 -->
    <div class="monitor-box">
        <div class="title">SO-HMNS V63.3 MONITOR</div>
        <div class="sub">MAGNITUDE COEFFICIENT 6.5</div>
        <hr style="border: 0; border-top: 1px solid #1e3a8a; margin: 15px 0;">
        <div class="status-line">[SYS] Auto-Computing...</div>
        <div class="status-line">[MATRIX] Active Factoring: M 4.9</div>
        <div class="status-line">[STATUS] <span class="success">100% SUCCESS</span></div>
    </div>

    <!-- 지도가 렌더링될 실제 구역 -->
    <div id="map"></div>

    <script>
        // 지도를 초기화하고 대한민국 서울 좌표를 중심점으로 잡습니다.
        var map = L.map('map').setView([37.5665, 126.9780], 13);

        // 오픈스트리트맵 타일 레이어 추가 (https 보안 프로토콜 링크)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 중심점에 글로벌 코어 마커 세팅
        L.marker([37.5665, 126.9780]).addTo(map)
            .bindPopup('[SYS] SO-HMNS Core Active.')
            .openPopup();
    </script>
</body>
</html>
