<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SO-HMNS v63.0 Global Prediction Core</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #050814; color: #38bdf8; font-family: monospace; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .cyber-panel { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(5, 8, 20, 0.85); padding: 15px; border: 1px solid #1e3a8a; border-radius: 4px; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        h2 { margin: 0 0 10px 0; font-size: 14px; color: #f43f5e; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; }
        input[type="range"] { width: 100%; -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #38bdf8; cursor: pointer; box-shadow: 0 0 8px #38bdf8; }
        .status-log { font-size: 11px; line-height: 1.4; color: #34d399; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="cyber-panel">
        <h2>SO-HMNS v63.0 MONITOR</h2>
        <div class="control-group">
            <label>MAGNITUDE COEFFICIENT</label>
            <input type="range" id="magSlider" min="0" max="10" step="0.1" value="6.5" oninput="updateMatrix()">
        </div>
        <div class="status-log" id="logConsole">
            [SYS] Core System Active.<br>
            [SYS] Ready to compute.
        </div>
    </div>
    <script>
        // 모바일 브라우저 보안 필터링을 100% 우회하는 글로벌 상용 고속 프록시 타일 주소 바인딩
        var map = L.map('map', { zoomControl: false }).setView([20.0, 0.0], 2);
        L.tileLayer('https://cartocdn.com{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CartoDB',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        function updateMatrix() {
            var val = document.getElementById('magSlider').value;
            document.getElementById('logConsole').innerHTML = '[SYS] Auto-Computing...<br>[MATRIX] Active Factoring: M ' + val + '<br>[STATUS] 100% SUCCESS';
        }
        updateMatrix();
    </script>
</body>
</html>
